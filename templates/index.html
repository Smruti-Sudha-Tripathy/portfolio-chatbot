<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smruti's AI Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load styles directly if static folder is not used or for simplicity -->
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --chat-bg: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
            --text-primary: #f8fafc; /* Slate 50 */
            --text-secondary: #94a3b8; /* Slate 400 */
            --accent-color: #3b82f6; /* Blue 500 */
            --accent-hover: #2563eb; /* Blue 600 */
            --user-msg-bg: #3b82f6;
            --bot-msg-bg: #334155; /* Slate 700 */
            --border-color: rgba(255, 255, 255, 0.1);
            --gradient-1: #3b82f6;
            --gradient-2: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.5);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
        }

        .title-text h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-text p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #10b981;
        }

        .chat-area {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            display: flex;
            max-width: 80%;
            animation: slideUp 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .bot .message-content {
            background: var(--bot-msg-bg);
            color: var(--text-primary);
            border-top-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user .message-content {
            background: var(--user-msg-bg);
            color: white;
            border-top-right-radius: 4px;
        }

        .input-area {
            padding: 24px 32px;
            background: rgba(30, 41, 59, 0.8);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 99px;
            padding: 8px 16px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 8px;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        button {
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: white;
            flex-shrink: 0;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        button svg {
            width: 20px;
            height: 20px;
            transform: translateX(1px);
        }

        .typing-indicator {
            display: none;
            gap: 4px;
            padding: 16px 20px;
            background: var(--bot-msg-bg);
            border-radius: 20px;
            border-top-left-radius: 4px;
            align-self: flex-start;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
            opacity: 0.6;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        .suggestions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
            justify-content: center;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Markdown rendering basic styles */
        .message-content h1, .message-content h2, .message-content h3 {
            margin-top: 12px;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        .message-content p {
            margin-bottom: 8px;
        }
        
        .message-content p:last-child {
            margin-bottom: 0;
        }
        
        .message-content ul, .message-content ol {
            margin-left: 20px;
            margin-bottom: 8px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content strong {
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div class="header-title">
                <div class="avatar">S</div>
                <div class="title-text">
                    <h1>Smruti's AI Assistant</h1>
                    <p><span class="status-dot"></span> Online and ready to chat</p>
                </div>
            </div>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <div class="message-content">
                    Hello! I'm an AI assistant trained on Smruti's resume. I can answer questions about their education, skills, projects, and professional achievements. What would you like to know?
                    
                    <div class="suggestions">
                        <div class="suggestion-chip" onclick="sendSuggestion('What is your highest education?')">Education</div>
                        <div class="suggestion-chip" onclick="sendSuggestion('What are your top technical skills?')">Skills</div>
                        <div class="suggestion-chip" onclick="sendSuggestion('Tell me about your most recent project.')">Projects</div>
                        <div class="suggestion-chip" onclick="sendSuggestion('What are your main achievements?')">Achievements</div>
                    </div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask about Smruti's resume..." autocomplete="off" onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendButton">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Simple Markdown parser for frontend -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const sendButton = document.getElementById('sendButton');

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function sendSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            
            if (sender === 'bot') {
                // Parse markdown for bot messages
                contentDiv.innerHTML = marked.parse(text);
            } else {
                contentDiv.textContent = text;
            }

            messageDiv.appendChild(contentDiv);
            
            // Insert before typing indicator
            chatArea.insertBefore(messageDiv, typingIndicator);
            scrollToBottom();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Disable input while sending
            userInput.value = '';
            userInput.disabled = true;
            sendButton.disabled = true;

            appendMessage('user', message);
            
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                typingIndicator.style.display = 'none';

                if (response.ok) {
                    appendMessage('bot', data.reply);
                } else {
                    appendMessage('bot', `<span style="color: #ef4444;">Error: ${data.error}</span>`);
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage('bot', '<span style="color: #ef4444;">Connection error. Please check if the server is running.</span>');
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
                scrollToBottom();
            }
        }
    </script>
</body>
</html>
